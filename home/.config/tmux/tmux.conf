# Shell
set-option -g default-command "/bin/bash"

# Terminal
set -g default-terminal "tmux-256color"
if-shell 'test "$(uname)" = "Darwin"' 'set -g default-terminal "screen-256color"'
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides ",*:RGB"

# Settings
set -g mouse on
set -s escape-time 0
set -g status-interval 0
set -g automatic-rename on
set -g allow-rename off
set -g automatic-rename-format ' #{b:pane_current_path}'
set -g allow-passthrough on

# Rebind prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# set vi-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind 't' new-window
bind 'c' new-window -c "#{pane_current_path}"
bind 's' split-window -v -c "#{pane_current_path}"
bind 'v' split-window -h -c "#{pane_current_path}"
bind 'p' run-shell "$HOME/.config/tmux/scripts/toggle-workspace-session.sh '#{pane_current_path}'"
bind 'o' run-shell "$HOME/.config/tmux/scripts/toggle-workspace-session.sh '#{pane_current_path}'"
bind 'q' run-shell "tmux detach-client"

set -g repeat-time 500

bind -r h previous-window
bind -r l next-window

# Mode style
set -g mode-style "fg=colour232,bg=#{?#{m:workspace-*,#S},yellow,cyan},bold"

# Popup style
set -g popup-style "bg=terminal,fg=default"
set -g popup-border-style "fg=#{?#{m:workspace-*,#S},yellow,cyan}"

# Message style
set -g message-style "fg=colour232,bg=#{?#{m:workspace-*,#S},yellow,cyan},bold"
set -g message-command-style "fg=colour232,bg=#{?#{m:workspace-*,#S},yellow,cyan},bold"

# Pane style
set -g pane-border-style 'fg=#{?#{m:workspace-*,#S},yellow,cyan}'
set -g pane-active-border-style "fg=#{?#{m:workspace-*,#S},yellow,cyan}"
set-window-option -g pane-border-status off

# Status style - yellow background when in workspace sessions
set -g status-style "#{?#{m:workspace-*,#S},fg=black,bg=yellow,bold,fg=cyan,bg=terminal}"
set -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[fg=cyan,bg=terminal]#[fg=black,bg=cyan] #{session_windows}#[fg=cyan,bg=terminal]"
set -g status-right "#[fg=colour8,bg=terminal] #S #[fg=green,bg=terminal] #[fg=black,bg=green]󱫋 #{session_attached}#[fg=green,bg=terminal]"

# Window style
set -g window-status-style "fg=colour8,bg=terminal"
set -g window-status-format "#[fg=default,bg=terminal]#[fg=default,bg=terminal] #W  "
set -g window-status-separator "  "
set -g window-status-current-format "#[fg=#{?#{m:workspace-*,#S},yellow,cyan},bg=terminal]#[fg=colour232,bg=#{?#{m:workspace-*,#S},yellow,cyan},bold]#W #[fg=#{?#{m:workspace-*,#S},yellow,cyan},bg=terminal,nobold]"

# Plugins

## Smart splits
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h'  'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j'  'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k'  'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l'  'select-pane -R'

bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

bind-key -n 'C-\' if -F "#{@pane-is-vim}" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
